services:
  mongodb:
    image: mongo:7
    container_name: vendor-mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: vendor_po_manager
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: vendor-server
    restart: always
    ports:
      - "5000:5000"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/vendor_po_manager
      - JWT_SECRET=your-super-secret-jwt-key-change-in-production
      - PORT=5000
      - NODE_ENV=production
      - FRONTEND_URL=http://localhost:3000
      # SMTP (optional)
      # - SMTP_HOST=smtp.gmail.com
      # - SMTP_PORT=587
      # - SMTP_USER=your@email.com
      # - SMTP_PASS=your-app-password
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - server-uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: vendor-client
    restart: always
    ports:
      - "3000:80"
    depends_on:
      server:
        condition: service_healthy

volumes:
  mongo-data:
  server-uploads:
