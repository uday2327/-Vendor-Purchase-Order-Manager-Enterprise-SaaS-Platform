name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  server:
    name: Server Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check server syntax
        run: node --check server.js

      - name: Smoke test health endpoint
        run: |
          PORT=5050 SKIP_DB=true JWT_SECRET=ci-secret FRONTEND_URL=http://localhost:3000 node server.js > server.log 2>&1 &
          SERVER_PID=$!
          trap "kill $SERVER_PID" EXIT
          for i in {1..20}; do
            if curl -fsS http://127.0.0.1:5050/api/health; then
              exit 0
            fi
            sleep 1
          done
          cat server.log
          exit 1

  client:
    name: Client Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  docker:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: [server, client]
    steps:
      - uses: actions/checkout@v4

      - name: Validate Docker Compose config
        run: docker compose config

      - name: Build Docker images
        run: |
          docker build -t vendor-server ./server
          docker build -t vendor-client ./client
